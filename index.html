<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Shaira!</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose-gold: #ffb199;
            --elegant-pink: #ff7eb3;
            --soft-gold: #ffeaa7;
            --deep-plum: #0f0418;
            --glass-bg: rgba(30, 10, 40, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--deep-plum);
            color: #ffffff;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        /* Fireworks Canvas */
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Scrollable Wrapper */
        .scroll-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 16px;
        }

        /* Main Glassmorphism Container */
        .container {
            text-align: center;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 2.5rem 2rem;
            border-radius: 28px;
            border: 1px solid rgba(255, 126, 179, 0.25);
            box-shadow:
                0 0 60px rgba(0, 0, 0, 0.8),
                inset 0 0 30px rgba(255, 177, 153, 0.05),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 600px;
            transform: translateY(30px);
            opacity: 0;
            animation: fadeUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.5s;
            margin: auto;
            position: relative;
        }

        @keyframes fadeUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Header Title */
        h1 {
            font-family: 'Pacifico', cursive;
            font-size: clamp(2.2rem, 9vw, 4.5rem);
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--soft-gold), var(--elegant-pink), var(--rose-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px rgba(255, 126, 179, 0.5));
            animation: float 4s ease-in-out infinite;
            line-height: 1.3;
            word-break: break-word;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(to right, var(--elegant-pink), var(--rose-gold));
            border-radius: 10px;
            margin: 1rem auto;
            opacity: 0.7;
        }

        /* Typing Container */
        .typing-container {
            min-height: 70px;
            margin: 1.2rem 0;
            font-size: clamp(0.95rem, 3.5vw, 1.2rem);
            line-height: 1.8;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        #typing-text {
            border-right: 2px solid var(--elegant-pink);
            padding-right: 4px;
            animation: blink 0.75s step-end infinite;
        }

        @keyframes blink {
            from, to { border-color: transparent; }
            50% { border-color: var(--elegant-pink); }
        }

        /* Button */
        .btn {
            background: linear-gradient(45deg, #ff7eb3, #ffb199, #ff7eb3);
            background-size: 200% auto;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: clamp(0.85rem, 3.5vw, 1.1rem);
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            box-shadow: 0 0 25px rgba(255, 126, 179, 0.5), 0 5px 15px rgba(0,0,0,0.3);
            margin-top: 0.8rem;
            display: block;
            width: 100%;
            max-width: 280px;
            margin-left: auto;
            margin-right: auto;
            animation: gradientShift 3s linear infinite;
            -webkit-appearance: none;
            appearance: none;
        }

        @keyframes gradientShift {
            to { background-position: 200% center; }
        }

        .btn:active {
            transform: scale(0.96);
            box-shadow: 0 3px 10px rgba(255, 126, 179, 0.4);
        }

        /* Surprise Message */
        #surprise-container {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #surprise-container.show {
            max-height: 1000px;
            opacity: 1;
            margin-top: 1.5rem;
        }

        .surprise-text {
            font-size: clamp(0.95rem, 3.5vw, 1.2rem);
            font-weight: 500;
            color: var(--soft-gold);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02));
            padding: clamp(1.2rem, 5vw, 2rem);
            border-radius: 20px;
            border: 1px solid rgba(255, 177, 153, 0.3);
            box-shadow:
                inset 0 0 20px rgba(255, 126, 179, 0.08),
                0 0 20px rgba(255, 126, 179, 0.12);
            line-height: 1.9;
            word-break: break-word;
        }

        /* Click Interaction Elements */
        .click-effect {
            position: fixed;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            pointer-events: none;
            animation: floatParticle 1.2s ease-out forwards;
            z-index: 9999;
        }

        @keyframes floatParticle {
            0% { transform: scale(0.5) translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.8) translateY(-80px) rotate(45deg); opacity: 0; }
        }

        /* Small devices (< 360px wide like older Androids) */
        @media (max-width: 360px) {
            .container {
                padding: 2rem 1.2rem;
                border-radius: 20px;
            }
            h1 {
                font-size: 2rem;
            }
            .typing-container {
                font-size: 0.9rem;
            }
            .btn {
                font-size: 0.8rem;
                padding: 13px 20px;
                letter-spacing: 1px;
            }
            .surprise-text {
                font-size: 0.9rem;
            }
        }

        /* Tall screens (like most modern phones) */
        @media (max-height: 700px) {
            .scroll-wrapper {
                align-items: flex-start;
            }
        }

        /* Landscape orientation on mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            .scroll-wrapper {
                align-items: flex-start;
                padding: 12px 16px;
            }
            h1 {
                font-size: clamp(1.8rem, 6vw, 2.5rem);
                margin-bottom: 0.3rem;
            }
            .divider {
                margin: 0.5rem auto;
            }
            .typing-container {
                min-height: 50px;
                margin: 0.8rem 0;
            }
            .btn {
                padding: 10px 24px;
                margin-top: 0.5rem;
            }
        }

        /* Tablets and iPads */
        @media (min-width: 768px) and (max-width: 1024px) {
            .container {
                padding: 3.5rem 3rem;
                max-width: 650px;
            }
        }

        /* Large desktop screens */
        @media (min-width: 1200px) {
            .container {
                padding: 4.5rem 4rem;
                max-width: 750px;
            }
        }
    </style>
</head>
<body>

    <canvas id="fireworks-canvas"></canvas>

    <div class="scroll-wrapper">
        <div class="container">
            <h1>Happy Birthday Shaira!</h1>
            <div class="divider"></div>

            <div class="typing-container">
                <span id="typing-text"></span>
            </div>

            <button class="btn" id="reveal-btn" onclick="revealSurprise()">Click for a Surprise 🎁</button>

            <div id="surprise-container">
                <div class="surprise-text">
                    You are an incredibly gorgeous and special woman, Shaira! 🌸<br><br>
                    May this year bring you endless success, radiant health, and unforgettable moments. Keep shining your beautiful light on the world and never stop being your wonderful self. Here's to an amazing new chapter! 🥂✨
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Typing Animation ---
        const message = "Wishing you a spectacular day filled with love, laughter, and endless joy. May all your beautiful dreams take flight today and always! 💖";
        const typingText = document.getElementById("typing-text");
        let charIndex = 0;

        function typeWriter() {
            if (charIndex < message.length) {
                typingText.textContent += message.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 45);
            } else {
                setTimeout(() => {
                    typingText.style.borderRight = "none";
                }, 2000);
            }
        }

        setTimeout(typeWriter, 1500);

        // --- Canvas Fireworks ---
        const canvas = document.getElementById('fireworks-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 300));

        const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth <= 768;

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speedScale = isMobile ? 0.65 : 1;
                const speed = (Math.random() * 6 + 2) * speedScale;
                this.velocity = {
                    x: Math.cos(angle) * speed,
                    y: Math.sin(angle) * speed
                };
                this.alpha = 1;
                this.friction = 0.96;
                this.gravity = 0.12;
                this.decay = Math.random() * 0.015 + 0.01;
                this.radius = isMobile ? 1.5 : 2.5;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = isMobile ? 6 : 12;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.velocity.y += this.gravity;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= this.decay;
            }
        }

        class Firework {
            constructor(startX, startY, targetX, targetY) {
                this.x = startX !== undefined ? startX : Math.random() * canvas.width;
                this.y = startY !== undefined ? startY : canvas.height + 10;
                this.targetX = targetX !== undefined ? targetX : this.x + (Math.random() - 0.5) * (canvas.width * 0.5);
                this.targetY = targetY !== undefined ? targetY : Math.random() * (canvas.height * 0.55);
                const speedScale = isMobile ? 0.75 : 1;
                this.speed = (4 + Math.random() * 4) * speedScale;
                const angle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
                this.velocity = {
                    x: Math.cos(angle) * this.speed,
                    y: Math.sin(angle) * this.speed
                };
                const hues = [330, 340, 350, 45, 280, 200];
                const selectedHue = hues[Math.floor(Math.random() * hues.length)] + (Math.random() * 20 - 10);
                this.color = `hsl(${selectedHue}, 100%, 70%)`;
                this.burst = false;
            }

            draw() {
                if (!this.burst) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, isMobile ? 2 : 3, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                    ctx.fill();
                    ctx.restore();
                }
            }

            update() {
                if (!this.burst) {
                    this.x += this.velocity.x;
                    this.y += this.velocity.y;
                    if (this.velocity.y >= 0 || this.y <= this.targetY) {
                        this.burst = true;
                        createParticles(this.x, this.y, this.color);
                    }
                }
            }
        }

        let fireworks = [];
        let particles = [];
        let intensity = isMobile ? 0.025 : 0.035;

        function createParticles(x, y, color) {
            const count = isMobile ? (40 + Math.random() * 25) : (90 + Math.random() * 50);
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // Throttle animation on mobile using RAF timing
        let lastTime = 0;
        const targetFPS = isMobile ? 40 : 60;
        const interval = 1000 / targetFPS;

        function animate(timestamp) {
            requestAnimationFrame(animate);
            const delta = timestamp - lastTime;
            if (delta < interval) return;
            lastTime = timestamp - (delta % interval);

            ctx.fillStyle = 'rgba(15, 4, 24, 0.22)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < intensity) {
                fireworks.push(new Firework());
            }

            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw();
                if (fireworks[i].burst) fireworks.splice(i, 1);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }
        }

        requestAnimationFrame(animate);

        // --- Reveal Surprise ---
        function revealSurprise() {
            const container = document.getElementById("surprise-container");
            const btn = document.getElementById("reveal-btn");

            if (!container.classList.contains("show")) {
                container.classList.add("show");
                btn.style.display = "none";

                const burstCount = isMobile ? 5 : 10;
                for (let i = 0; i < burstCount; i++) {
                    setTimeout(() => fireworks.push(new Firework()), i * 150);
                }

                intensity = isMobile ? 0.05 : 0.09;
            }
        }

        // --- Touch / Click Interaction ---
        function handleInteraction(clientX, clientY) {
            if (
                document.elementFromPoint(clientX, clientY)?.closest('.container')
            ) return;

            const effect = document.createElement('div');
            effect.className = 'click-effect';
            effect.innerHTML = ['✨', '🌸', '💖', '🎉', '🌟'][Math.floor(Math.random() * 5)];
            effect.style.left = `${clientX - 15}px`;
            effect.style.top = `${clientY - 15}px`;
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 1200);

            const fw = new Firework(
                clientX,
                canvas.height,
                clientX + (Math.random() - 0.5) * 80,
                clientY
            );
            fireworks.push(fw);
        }

        window.addEventListener('click', (e) => {
            handleInteraction(e.clientX, e.clientY);
        });

        window.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            handleInteraction(touch.clientX, touch.clientY);
        }, { passive: true });
    </script>
</body>
</html>
